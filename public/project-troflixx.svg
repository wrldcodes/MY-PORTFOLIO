<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Troflixx project preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdbdf0" stop-opacity="1"/>
      <stop offset="55%" stop-color="#5f4a8b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5f4a8b" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="675" fill="url(#shine)"/>

  <g opacity="0.22">
    <circle cx="220" cy="150" r="140" fill="#fefacd"/>
    <circle cx="980" cy="480" r="200" fill="#f9faff"/>
    <rect x="120" y="320" width="420" height="18" rx="9" fill="#ffffff"/>
    <rect x="120" y="362" width="540" height="18" rx="9" fill="#ffffff"/>
    <rect x="120" y="404" width="480" height="18" rx="9" fill="#ffffff"/>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#f9faff">
    <text x="72" y="120" font-size="18" opacity="0.9" letter-spacing="0.18em">PROJECT</text>
    <text x="72" y="220" font-size="72" font-weight="700">Troflixx</text>
    <text x="72" y="270" font-size="26" opacity="0.9">Movie discovery UI preview</text>
  </g>
</svg>

