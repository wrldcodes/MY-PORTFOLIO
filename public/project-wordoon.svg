<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Woordoon project preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6dadd0" stop-opacity="1"/>
      <stop offset="50%" stop-color="#cdbdf0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#343c47" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="675" fill="url(#shine)"/>

  <g opacity="0.22">
    <rect x="120" y="150" width="960" height="360" rx="34" fill="#ffffff"/>
    <g fill="#5f4a8b" opacity="0.55">
      <rect x="170" y="220" width="140" height="90" rx="18"/>
      <rect x="330" y="220" width="140" height="90" rx="18"/>
      <rect x="490" y="220" width="140" height="90" rx="18"/>
      <rect x="650" y="220" width="140" height="90" rx="18"/>
      <rect x="170" y="330" width="140" height="90" rx="18"/>
      <rect x="330" y="330" width="140" height="90" rx="18"/>
      <rect x="490" y="330" width="140" height="90" rx="18"/>
      <rect x="650" y="330" width="140" height="90" rx="18"/>
    </g>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#f9faff">
    <text x="72" y="120" font-size="18" opacity="0.9" letter-spacing="0.18em">PROJECT</text>
    <text x="72" y="220" font-size="72" font-weight="700">Woordoon</text>
    <text x="72" y="270" font-size="26" opacity="0.9">Word game UI preview</text>
  </g>
</svg>

